[workspace]
authors = ["Contributors to NGV-FBMC"]
channels = ["conda-forge", "bioconda", "gurobi"]
name = "NGV-FBMC"
platforms = ["win-64", "linux-64"]
version = "0.1.0"

[tasks]

update-dags = """
	dot -c && \
	snakemake results/redispatch/networks/SQ/2040.nc -F --dag | dot -Tpng -o doc/img/dag_redispatch-SQ-2040.png && \
	snakemake --rulegraph -F | sed -n "/digraph/,/}/p" | dot -Tpng -o doc/img/rulegraph_all.png
"""

[dependencies]
atlite = ">=0.3"
bokeh = ">=3.8.0"
cartopy = ">=0.25.0"
copernicusmarine = ">=2.2.4"
country_converter = ">=1.3.2"
dask = ">=2025.10.0"
descartes = ">=1.1.0"
entsoe-py = ">=0.7.8"
fiona = ">=1.10.1"
folium = ">=0.20.0"
geojson = ">=3.2.0"
geopandas = ">=1"
geopy = ">=2.4.1"
glpk = ">=5.0"
graphviz = ">=12.2.1"
gurobi = ">=12.0.3"
highspy = ">=1.12.0"
ipython = ">=9.7.0"
jpype1 = ">=1.6.0"
jupyter = ">=1.1.1"
libgdal-netcdf = ">=3.10.3"
linopy = ">=0.4.4"
lxml = ">=6.0.2"
matplotlib = ">=3.10.7"
memory_profiler = ">=0.61.0"
netcdf4 = ">=1.7.2"
networkx = ">=3.5"
numpy = ">=1.26.4"
openpyxl = ">=3.1.5"
pandas = ">=2.1"
plotly = ">=6.4.0"
pydantic = ">=2"
python-dotenv = ">=1.0"
pre-commit = ">=4.3.0"
proj = ">=9.6.2"
pylint = ">=4.0.2"
pypsa = ">=1.1.0,<2"
pyscipopt = ">=5.6.0"
pytables = ">=3.10.2"
python = ">=3.10"
pytz = ">=2025.2"
pyxlsb = ">=1.0.10"
rasterio = ">=1.4.3"
rioxarray = ">=0.20.0"
ruff = ">=0.14.3"
"ruamel.yaml" = ">=0.18.0"
scipy = ">=1.16.3"
seaborn = ">=0.13.2"
shapely = ">=2.0"
snakemake-executor-plugin-cluster-generic = ">=1.0.9"
snakemake-minimal = ">=9.16.3"
snakemake-storage-plugin-http = ">=0.3"
tenacity = ">=9.1.2"
tqdm = ">=4.67.1"
tsam = ">=2.3.1"
xarray = ">=2024.3.0,<2025.7.0"
xlrd = ">=2.0.2"
yaml = ">=0.2.5"
snakemake-storage-plugin-cached-http = ">=0.2.1"
snakemake-logger-plugin-pypsa = ">=0.1.0"

[target.unix.dependencies]
snakemake-executor-plugin-slurm = ">=1.9.2"

[feature.dev.dependencies]
reuse = "*"

[environments]
dev = ["dev"]
